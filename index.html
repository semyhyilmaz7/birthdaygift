<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Monique! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f0c29; 
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }
        .content {
            padding: 50px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 5rem; 
            color: #ff4d6d; /* Canlı bir pembe/kırmızı */
            text-shadow: 3px 3px 15px rgba(255, 77, 109, 0.5);
            margin: 10px 0;
        }
        h2 {
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        p { 
            font-size: 1.4rem; 
            max-width: 80%;
            margin: 25px auto;
            color: #fff;
            line-height: 1.6;
            font-weight: 300;
        }
        .heart {
            color: #ff4d6d;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .decor { font-size: 3rem; margin: 15px; }
    </style>
</head>
<body>
    <div class="content">
        <div class="decor">🥳 ✨ 🎈</div>
        <h2>Happy Birthday</h2>
        <h1>Monique <span class="heart">❤️</span></h1>
        <p>May your new year be as bright and beautiful as you are. <br> 
        Wishing you a day filled with love and laughter!</p>
        <div class="decor">🎂 🍾 💖</div>
    </div>
</body>
</html>
