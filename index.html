<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Monique! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden; /* Sayfa kaymasın */
        }

        /* 1. Giriş Ekranı (Üst Katman) */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0c29; /* Koyu lacivert */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100; /* En üstte durur */
            transition: opacity 1s ease, visibility 1s; /* Kaybolma animasyonu */
        }

        /* Kalp Şeklindeki Buton */
        .heart-button {
            background-color: #ff4d6d; /* Canlı pembe/kırmızı */
            color: white;
            border: none;
            padding: 30px 60px;
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px; /* Yuvarlak köşeler */
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: pulseButton 2s infinite; /* Atan kalp efekti */
        }

        @keyframes pulseButton {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255, 77, 109, 0.7); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5); }
        }

        .heart-button:hover {
            background-color: #ff758f;
            transform: translateY(-5px);
        }

        .heart-button:active { transform: translateY(2px); }

        /* 2. Asıl İçerik Ekranı (Alt Katman) */
        #main-content {
            display: none; /* Başlangıçta gizli */
            height: 100%;
            position: relative;
            z-index: 1;
        }

        /* Arka Plan: Şık bir doğa manzarası */
        .bg-image {
            background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: blur(5px) brightness(0.7); /* Bulanık ve koyu */
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .main-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .content-box {
            padding: 40px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5); /* Koyu şeffaf */
            backdrop-filter: blur(10px); /* Cam efekti */
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
            animation: fadeInContent 1.5s ease-out; /* İçerik gelme animasyonu */
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .profile-pic {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 5px solid #ff4d6d;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.6);
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 4rem; 
            color: #ff4d6d;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; color: #ffd700; }
        
        p { font-size: 1.1rem; line-height: 1.6; font-style: italic; color: #eee; margin-top: 20px;}
        
        .heart-icon { display: inline-block; animation: pulseHeart 1.5s infinite; color: #ff4d6d; }
        @keyframes pulseHeart { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
        
        /* Müzik Çalar: Ekranda görünmeyecek (hidden) */
        audio { display: none; }

    </style>
</head>

    </div>

    <div id="main-content">
        <div class="bg-image"></div>
