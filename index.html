<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Monique ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%; width: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* GİRİŞ EKRANI */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }

        .heart-button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 25px 50px;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* ANA İÇERİK */
        #main-content {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Manzara Resmi - Daha Sağlam Link */
        .bg-image {
            background-image: url('https://wallpaperaccess.com/full/1154341.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(3px) brightness(0.5);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .content-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%; max-width: 380px;
            text-align: center;
        }

        .profile-pic {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 5px solid #ff4d6d;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 4rem; color: #ff4d6d; }
        p { font-style: italic; color: #fff; font-size: 1.1rem; line-height: 1.6; }

    </style>
</head>
<body>

    <div id="intro-screen" onclick="startSurprise()">
        <button class="heart-button">Press for a Surprise! ❤️</button>
    </div>

    <div id="main-content">
        <div class="bg-image"></div>
        <div class="content-box">
            <img src="Monique.jpg" alt="Monique" class="profile-pic">
            <h2 style="color: #ffd700; letter-spacing: 2px; font-size: 1.1rem;">HAPPY BIRTHDAY</h2>
            <h1>Monique</h1>
            <p>"May your new year be as bright and beautiful as you are. Wishing you a day filled with love and laughter!"</p>
        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startSurprise() {
            var audio = document.getElementById("myAudio");
            
            // Müziği çal ve sayfayı değiştir
            audio.play().catch(function(error) {
                console.log("Müzik çalma hatası:", error);
            });

            document.getElementById("intro-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }
    </script>
</body>
</html>
