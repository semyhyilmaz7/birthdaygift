<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Monique!</title>
    <style>
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            color: white;
            text-align: center;
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .content {
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        h1 { 
            font-size: 3.5rem; 
            color: #ffd700; /* Altın rengi */
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 2px;
        }
        p { 
            font-size: 1.2rem; 
            max-width: 80%;
            margin: 20px auto;
            color: #ccc;
            line-height: 1.6;
        }
        .sparkles { font-size: 2rem; }
    </style>
</head>
<body>
    <div class="content">
        <div class="sparkles">✨ ✨ ✨</div>
        <h2>Happy Birthday</h2>
        <h1>Monique Oroyan</h1>
        <p>May your new year be as bright and beautiful as you are. <br> Wishing you a day filled with love and laughter!</p>
        <div class="sparkles">🎂 🥂 ✨</div>
    </div>
</body>
</html>
