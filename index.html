<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Monique ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%; width: 100%;
            /* HAREKETLİ GECE MANZARASI ARKA PLANI */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* GİRİŞ EKRANI */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: all 1s ease;
        }

        .heart-button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* ANA İÇERİK */
        #main-content {
            display: none;
            opacity: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CAM EFEKTLİ KART */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            animation: cardAppear 1.5s ease-out forwards;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #ff4d6d;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.4);
        }

        .label {
            color: #ffd700;
            letter-spacing: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #ff4d6d;
            margin-bottom: 20px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .message {
            font-size: 1rem;
            line-height: 1.7;
            color: #ccc;
            font-weight: 300;
            padding: 0 10px;
        }

        .heart-icon { color: #ff4d6d; animation: heartbeat 1.2s infinite; display: inline-block; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

    </style>
</head>
<body>

    <div id="intro-screen" onclick="startSurprise()">
        <button class="heart-button">Press for a Surprise! ❤️</button>
    </div>

    <div id="main-content" style="display: none;">
        <div class="glass-card">
            <img src="Monique.jpg" alt="Monique" class="profile-pic">
            <p class="label">Happy Birthday</p>
            <h1>Monique <span class="heart-icon">❤️</span></h1>
            <p class="message">"May your new year be as bright and beautiful as you are. Wishing you a day filled with love and laughter!"</p>
        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startSurprise() {
            var audio = document.getElementById("myAudio");
            audio.play();

            document.getElementById("intro-screen").style.opacity = "0";
            setTimeout(function() {
                document.getElementById("intro-screen").style.display = "none";
                var main = document.getElementById("main-content");
                main.style.display = "flex";
                setTimeout(() => { main.style.opacity = "1"; }, 100);
            }, 1000);
        }
    </script>
</body>
</html>
