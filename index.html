<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Monique! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden; /* Sayfa kaymasın */
        }

        /* 1. Arka Plan: Şık bir doğa manzarası */
        .bg-image {
            background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: blur(5px) brightness(0.7); /* Fotoğrafı hafif bulanık ve koyu yapar */
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; /* En arkaya atar */
        }

        .main-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1; /* İçeriği öne çeker */
        }

        .content {
            padding: 40px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.4); /* Koyu şeffaf arka plan */
            backdrop-filter: blur(10px); /* Cam efekti */
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        
        .profile-pic {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 5px solid #ff4d6d;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.6);
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 4rem; 
            color: #ff4d6d;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; color: #ffd700; }
        
        p { font-size: 1.1rem; line-height: 1.6; font-style: italic; color: #eee; margin-top: 20px;}
        
        .heart { display: inline-block; animation: pulse 1.5s infinite; color: #ff4d6d; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
        
        /* 2. Müzik Çalar: Ekranda görünmeyecek (hidden) */
        audio { display: none; }
